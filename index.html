<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 模型配置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .tab {
            padding: 15px 30px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 1em;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
            font-weight: bold;
        }

        .status {
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #28a745;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .model-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .model-card {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .model-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }

        .model-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .model-card .provider {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .model-card .details {
            font-size: 0.85em;
            color: #888;
        }

        .model-card .details div {
            margin: 5px 0;
        }

        .select-btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .select-btn:hover {
            transform: scale(1.05);
        }

        .select-btn.selected {
            background: #28a745;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .current-model {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .current-model h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .current-model .info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .current-model .info-item {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .current-model .info-item label {
            display: block;
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .current-model .info-item span {
            font-weight: bold;
            color: #333;
        }

        /* Form styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .provider-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .provider-card {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
        }

        .provider-card h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .provider-card .provider-info {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
        }

        .provider-card .provider-models {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #dee2e6;
        }

        .provider-card .provider-models h4 {
            font-size: 1em;
            margin-bottom: 10px;
            color: #333;
        }

        .provider-card .model-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .model-tag {
            background: #e9ecef;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #666;
        }

        .add-provider-form {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .add-provider-form h3 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 OpenClaw 模型配置</h1>
            <p>管理大模型供应商和模型配置</p>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="models">模型选择</button>
            <button class="tab" data-tab="providers">供应商管理</button>
        </div>

        <div class="status">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">正在连接...</span>
        </div>

        <div class="content">
            <div id="loading" class="loading">
                <p>正在加载配置...</p>
            </div>

            <div id="error" class="error" style="display: none;"></div>

            <div id="success" class="success" style="display: none;"></div>

            <div id="mainContent" style="display: none;">
                <!-- Models Tab -->
                <div class="tab-content active" id="modelsTab">
                    <div class="section">
                        <h22>当前使用的模型</h2>
                        <div class="current-model" id="currentModel">
                            <h3>加载中...</h3>
                        </div>
                    </div>

                    <div class="section">
                        <h2>可用模型列表</h2>
                        <div class="model-list" id="modelList"></div>
                    </div>
                </div>

                <!-- Providers Tab -->
                <div class="tab-content" id="providersTab">
                    <div class="section">
                        <h2>添加新供应商</h2>
                        <div class="add-provider-form">
                            <h3>➕ 添加供应商</h3>
                            <form id="addProviderForm">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>供应商名称 *</label>
                                        <input type="text" id="providerName" placeholder="例如: openai, anthropic" required>
                                    </div>
                                    <div class="form-group">
                                        <label>API 类型 *</label>
                                        <select id="apiType" required>
                                            <option value="openai-completions">OpenAI Completions</option>
                                            <option value="openai-chat">OpenAI Chat</option>
                                            <option value="anthropic">Anthropic</option>
                                            <option value="custom">自定义</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Base URL *</label>
                                    <input type="url" id="baseUrl" placeholder="例如: https://api.openai.com/v1" required>
                                </div>
                                <div class="form-group">
                                    <label>API Key</label>
                                    <input type="password" id="apiKey" placeholder="输入 API Key（可选）">
                                </div>
                                <button type="submit" class="btn btn-primary">添加供应商</button>
                            </form>
                        </div>
                    </div>

                    <div class="section">
                        <h2>已配置的供应商</h2>
                        <div class="provider-list" id="providerList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
